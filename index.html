<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Check-in Sportivo</title>
    <!-- Includiamo i font ufficiali per replicare lo stile pulito dello screen -->
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sports-green: #1b8a5a;
            --text-dark: #1e2432;
            --text-gray: #657786;
            --text-green: #11693e;
            --border-light: #f5f6f8;
            --bg-app: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- PANNELLO DI CONTROLLO INTERATTIVO --- */
        #control-panel {
            background: #ffffff;
            border-bottom: 2px solid #ccc;
            padding: 15px;
            width: 100%;
            max-width: 412px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        #control-panel label {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-dark);
        }
        #control-panel input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        /* --- CONTENITORE PRINCIPALE (STILE SMARTPHONE) --- */
        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 892px; /* Proporzioni iPhone standard */
            background-color: var(--bg-app);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* --- HEADER VERDE SPORT --- */
        .green-header {
            background-color: var(--sports-green);
            /* Sfondo geometrico leggero ispirato a palloni/racchette in IMG_0891.jpg */
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 20%, rgba(255,255,255,0.03) 0%, transparent 30%);
            height: 240px;
            position: relative;
            color: #ffffff;
            padding: 16px 20px;
            box-sizing: border-box;
        }

        /* Bottoni Header (Chiudi e Condividi) */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .btn-circle {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* --- BLOCCO FOTO PROFILO + BORDO ANIMATO --- */
        .avatar-wrapper {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 170px;
            height: 170px;
            z-index: 10;
        }

        .avatar-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            position: absolute;
            top: 10px;
            left: 10px;
            border: 4px solid var(--sports-green);
            box-sizing: border-box;
        }

        /* Cerchio SVG per creare la sequenza esatta di Trattino-Spazio-Pallino-Spazio */
        .rotating-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 170px;
            height: 170px;
            transform: rotate(-90deg);
        }
        .animated-border {
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
            /* La sequenza crea alternatamente un trattino lungo e un pallino corto */
            stroke-dasharray: 25 12 1 12; 
            transform-origin: center;
            animation: spin 25s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* --- CORPO DELLA SCHEDA (BIANCO) --- */
        .card-body {
            background-color: var(--bg-app);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            margin-top: -24px;
            position: relative;
            padding-top: 75px; /* Spazio per far sporgere l'avatar */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: calc(100% - 216px);
            box-sizing: border-box;
        }

        .user-info {
            text-align: center;
            margin-bottom: 25px;
        }
        .user-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 6px 0;
        }
        .checkin-status {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-green);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* --- LISTA DETTAGLI (VENUE, ACTIVITY, CATEGORY) --- */
        .details-list {
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .detail-item {
            display: flex;
            align-items: flex-start;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
        }
        .detail-icon {
            width: 24px;
            color: var(--text-gray);
            margin-right: 15px;
            margin-top: 2px;
            display: flex;
            justify-content: center;
        }
        .detail-label {
            font-size: 1.05rem;
            color: var(--text-gray);
            font-weight: 500;
            flex: 1;
        }
        .detail-value {
            font-size: 1.05rem;
            color: #4a5568;
            font-weight: 600;
            text-align: right;
            max-width: 60%;
            line-height: 1.3;
        }

        /* Nascondi il pannello se si decide di stampare in PDF o fare screenshot puliti */
        @media print {
            #control-panel { display: none; }
            .phone-container { box-shadow: none; }
        }
    </style>
</head>
<body>

    <!-- PANNELLO DI CONTROLLO INTERATTIVO -->
    <div id="control-panel">
        <label for="datetime-input">Scegli Data e Ora del Check-in:</label>
        <input type="datetime-local" id="datetime-input">
    </div>

    <!-- SCHERMATA SMARTPHONE -->
    <div class="phone-container">
        
        <!-- HEADER VERDE -->
        <div class="green-header">
            
            <div class="header-actions">
                <div class="btn-circle">
                    <!-- Icona Chiudi (X) -->
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
                <div class="btn-circle">
                    <!-- Icona Condividi (Upload) -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                </div>
            </div>

            <!-- FOTO PROFILO + TRATTINI E PALLINI ATTACCATI INTORNO -->
            <div class="avatar-wrapper">
                <svg class="rotating-svg" viewBox="0 0 100 100">
                    <circle class="animated-border" cx="50" cy="50" r="46"/>
                </svg>
                <!-- Sostituisci questo link per inserire una tua foto diversa in futuro -->
                   <img class="avatar-img" src="my-photo.jpg" alt="Foto Profilo">
            </div>
        </div>

        <!-- AREA BIANCA CON DATI CORRENTI -->
        <div class="card-body">
            <div class="user-info">
                <h2 class="user-name">Francesco Zollo • 672426597</h2>
                <div class="checkin-status">
                    <span>Check-in:</span>
                    <span id="checkin-date-string">Jun 09, 18:56</span>
                    <span>•</span>
                    <span>9</span>
                </div>
            </div>

            <!-- DETTAGLI COMPLETI COME DA SCREEN ORIGINALE -->
            <div class="details-list">
                <div class="detail-item">
                    <div class="detail-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    </div>
                    <div class="detail-label">Venue</div>
                    <div class="detail-value" style="color: #4a628a;">Winne's Club | Brussels Sports Center</div>
                </div>

                <div class="detail-item">
                    <div class="detail-icon">
                        <!-- Icona borraccia/sport stilizzata -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 20h12V10H6v10zM9 10V6a3 3 0 0 1 6 0v4M12 2v2"/></svg>
                    </div>
                    <div class="detail-label">Activity</div>
                    <div class="detail-value" style="color: #4a628a;">Crosstraining</div>
                </div>

                <div class="detail-item">
                    <div class="detail-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                    </div>
                    <div class="detail-label">Category</div>
                    <div class="detail-value" style="color: #4a628a;">Crosstraining</div>
                </div>
            </div>
        </div>

    </div>

    <!-- LOGICA IN JAVASCRIPT PER AGGIORNARE LA DATA IN TEMPO REALE -->
    <script>
        const datetimeInput = document.getElementById('datetime-input');
        const checkinDateString = document.getElementById('checkin-date-string');

        // Mappa dei mesi in inglese corti come richiesto dallo screen
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        // Funzione che prende i dati temporali e aggiorna l'app
        function updateDateTime(dateObj) {
            const hours = String(dateObj.getHours()).padStart(2, '0');
            const minutes = String(dateObj.getMinutes()).padStart(2, '0');
            
            // Costruisci la stringa del check-in (es: Jun 09, 18:56)
            const monthStr = months[dateObj.getMonth()];
            const dayStr = String(dateObj.getDate()).padStart(2, '0');
            checkinDateString.innerText = `${monthStr} ${dayStr}, ${hours}:${minutes}`;
        }

        // Imposta la data iniziale corretta al caricamento (Default: Ora corrente locale)
        const now = new Date();
        updateDateTime(now);

        // Pre-compila l'input HTML con la data corrente convertita nel fuso orario locale corretto
        const tzOffset = now.getTimezoneOffset() * 60000;
        const localISOTime = (new Date(now - tzOffset)).toISOString().slice(0, 16);
        datetimeInput.value = localISOTime;

        // Ascolta le modifiche dell'utente sul calendario/orologio
        datetimeInput.addEventListener('input', (e) => {
            if (e.target.value) {
                const selectedDate = new Date(e.target.value);
                updateDateTime(selectedDate);
            }
        });
    </script>
</body>
</html>
